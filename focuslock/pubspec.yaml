name: focuslock
description: "KillSwitch - A production-grade Digital Wellbeing application to block distracting apps and enforce focus sessions."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^2.3.5
  
  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  firebase_remote_config: ^5.0.0
  
  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  
  # Database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # Routing
  go_router: ^14.1.0
  
  # Security
  flutter_secure_storage: ^9.2.1
  local_auth: ^2.2.0
  pointycastle: ^3.9.1
  
  # Notifications
  flutter_local_notifications: ^17.1.2
  
  # Charts
  fl_chart: ^0.68.0
  
  # UI & Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  uuid: ^4.4.0
  
  # Native Interaction
  workmanager: ^0.5.2
  flutter_foreground_task: ^6.1.1
  flutter_overlay_window: ^0.4.3
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  installed_applications: ^2.1.1
  connectivity_plus: ^6.0.3
  
  # Monetization removed (App is now 100% free)

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  drift_dev: ^2.16.0
  riverpod_generator: ^2.3.5
  freezed: ^2.5.2
  json_serializable: ^8.1.0
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4
  mocktail: ^1.0.3
  drift_testable: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
